name: Build Package

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y jq zip rsync

      - name: Build package
        run: ./scripts/build-package.sh

      - name: Resolve package path
        id: pkg
        run: |
          PKG=$(ls -1 dist/*.zip | head -n 1)
          if [ -z "$PKG" ]; then
            echo "No package produced" >&2
            exit 1
          fi
          echo "file=$PKG" >> "$GITHUB_OUTPUT"

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: timestate-package
          path: ${{ steps.pkg.outputs.file }}
          if-no-files-found: error
