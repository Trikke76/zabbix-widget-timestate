name: Build Package

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y jq zip rsync

      - name: Build package
        run: ./scripts/build-package.sh

      - name: Resolve package path
        id: pkg
        run: |
          PKG=$(ls -1 dist/*.zip | head -n 1)
          if [ -z "$PKG" ]; then
            echo "No package produced" >&2
            exit 1
          fi
          echo "file=$PKG" >> "$GITHUB_OUTPUT"
          VERSION=$(jq -r '.version' manifest.json)
          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
            echo "manifest.json missing version" >&2
            exit 1
          fi
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "name=Time State v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: timestate-package
          path: ${{ steps.pkg.outputs.file }}
          if-no-files-found: error

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.pkg.outputs.tag }}
          name: ${{ steps.pkg.outputs.name }}
          generate_release_notes: true
          files: ${{ steps.pkg.outputs.file }}
